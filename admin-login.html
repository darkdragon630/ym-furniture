<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - YM FURNITUR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo-small">YM FURNITUR</div>
                <h2>Login Admin</h2>
                <p>Masuk untuk mengelola sistem toko</p>
            </div>
            
            <div id="errorMessage" class="error-msg" style="display:none;"></div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email Admin</label>
                    <input type="email" id="adminEmail" placeholder="admin@ymfurnitur.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Login Admin</button>
            </form>
            
            <div class="auth-footer">
                Belum punya akun? <a href="admin-register.html">Daftar Admin</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-admin.js"></script>
</body>
</html>
