<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - YM FURNITUR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo-small">YM FURNITUR</div>
                <h2>Daftar Pelanggan</h2>
                <p>Buat akun untuk berbelanja dan mendapatkan promo</p>
            </div>
            
            <div id="errorMessage" class="error-msg" style="display:none;"></div>
            <div id="successMessage" class="success-msg" style="display:none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="regNama" placeholder="Nama Anda" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Nomor HP</label>
                    <input type="tel" id="regPhone" placeholder="08xxxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="regConfirm" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Daftar</button>
            </form>
            
            <div class="divider">atau</div>
            
            <button class="btn-google">
                <i class="fab fa-google"></i> Daftar dengan Google
            </button>
            
            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
