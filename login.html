<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YM FURNITUR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo-small">YM FURNITUR</div>
                <h2>Login Pelanggan</h2>
                <p>Masuk untuk berbelanja dan melihat riwayat pesanan</p>
            </div>
            
            <div id="errorMessage" class="error-msg" style="display:none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" id="rememberMe"> Ingat saya</label>
                    <a href="forgot-password.html" class="forgot-pass">Lupa password?</a>
                </div>
                <button type="submit" class="btn-primary btn-full">Login</button>
            </form>
            
            <div class="divider">atau</div>
            
            <button class="btn-google">
                <i class="fab fa-google"></i> Login dengan Google
            </button>
            
            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
