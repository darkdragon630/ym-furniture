<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - YM FURNITUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <!-- Logo -->
            <div class="auth-header">
                <div class="logo-small">YM FURNITUR</div>
                <h2>Lupa Password</h2>
                <p>Masukkan email Anda untuk mereset password</p>
            </div>
            
            <div id="errorMessage" class="error-msg" style="display:none;"></div>
            <div id="successMessage" class="success-msg" style="display:none;"></div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="forgotEmail" placeholder="email@example.com" required>
                </div>
                
                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-paper-plane"></i> Kirim Link Reset
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="login.html">
                    <i class="fas fa-arrow-left"></i> Kembali ke Login
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
