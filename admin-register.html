<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Admin - YM FURNITUR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo-small">YM FURNITUR</div>
                <h2>Daftar Admin</h2>
                <p>Buat akun admin untuk mengelola toko</p>
            </div>
            
            <div id="errorMessage" class="error-msg" style="display:none;"></div>
            <div id="successMessage" class="success-msg" style="display:none;"></div>
            
            <form id="adminRegisterForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="adminNama" placeholder="Ike Puspitasari" required>
                </div>
                <div class="form-group">
                    <label>Email Admin</label>
                    <input type="email" id="adminEmail" placeholder="admin@ymfurnitur.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="adminConfirm" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Daftar Admin</button>
            </form>
            
            <div class="auth-footer">
                Sudah punya akun? <a href="admin-login.html">Login Admin</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-admin.js"></script>
</body>
</html>
